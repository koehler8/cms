<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      Per-page <title>, <meta name="description">, og:*, twitter:*, canonical,
      hreflang, and JSON-LD blocks are emitted by usePageMeta at SSG render
      time. Site-wide invariants (favicon, web-app manifest, the JSON-LD
      Organization snippet, mobile-chrome theme color) live here.
    -->
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="<%= manifestThemeColor %>">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "<%= site %>",
      "url": "<%= siteUrl %>",
      "logo": "<%= ABSOLUTE_LOGO %>",
      "sameAs": <%- siteSameAsJson %>
    }
    </script>
  </head>
  <!-- Google Analytics is loaded dynamically after user consent -->
  <body>
    <noscript>
      <style>
        /* Scroll-reveal targets stay opacity:0 until JS observes them. If JS
           never runs, force them visible so SSG content remains accessible. */
        .fade-up-in { opacity: 1 !important; transform: none !important; }
      </style>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
